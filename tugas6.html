<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Analisis Pembuktian Teori Bilangan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #1d4350, #a43931);
}

.container{
    max-width:900px;
    margin:40px auto;
    background: rgba(255,255,255,0.96);
    padding:25px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1e293b;
}

input{
    width:48%;
    padding:12px;
    margin:6px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

.card{
    margin:18px 0;
    padding:18px;
    background:#f8fafc;
    border-left:6px solid #dc2626;
    border-radius:12px;
}

.link-input{
    width:100%;
    margin-top:12px;
}

button{
    display:block;
    margin:30px auto;
    padding:12px 28px;
    border:none;
    border-radius:20px;
    background:#dc2626;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<div class="container">
    <h1>Analisis Pembuktian Teori Bilangan</h1>

    <input type="text" id="nama" placeholder="Nama Mahasiswa">
    <input type="text" id="nim" placeholder="NIM">

    <div id="soalContainer"></div>

    <button onclick="kirimData()">Kumpulkan Link Jawaban</button>
</div>

<script>
const soal = [
"Seorang siswa menyatakan bahwa jika a dan b adalah bilangan genap, maka a+b selalu genap. Buktikan menggunakan definisi bilangan genap.",
"Seorang mahasiswa berpendapat bahwa hasil kali dua bilangan ganjil selalu ganjil. Buktikan pernyataan tersebut secara formal.",
"Buktikan bahwa jika suatu bilangan habis dibagi 6, maka bilangan tersebut pasti habis dibagi 2 dan 3.",
"Buktikan bahwa kuadrat dari setiap bilangan bulat genap selalu merupakan bilangan genap.",
"Buktikan bahwa jika p adalah bilangan prima dan p membagi ab, maka p membagi a atau p membagi b."
];

let container = document.getElementById("soalContainer");

soal.forEach((item, i)=>{
    container.innerHTML += `
    <div class="card">
        <b>Soal ${i+1}</b><br><br>
        ${item}
        <input type="text" class="link-input" id="link${i}" placeholder="Masukkan link jawaban soal ${i+1}">
    </div>
    `;
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDGpG2vAoWqwn46upNtU9M-Cx1gkKwBE-c",
    authDomain: "chatting-matematika.firebaseapp.com",
    databaseURL: "https://chatting-matematika-default-rtdb.firebaseio.com",
    projectId: "chatting-matematika",
    storageBucket: "chatting-matematika.appspot.com",
    messagingSenderId: "811492413631",
    appId: "1:811492413631:web:a29a4bba38a6541f90360a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.kirimData = function(){

    let nama = document.getElementById("nama").value;
    let nim = document.getElementById("nim").value;

    let jawaban = [];

    for(let i=0;i<5;i++){
        let val = document.getElementById("link"+i).value;

        if(val === ""){
            alert("Semua link jawaban harus diisi.");
            return;
        }

        jawaban.push({
            soal: i+1,
            link: val
        });
    }

    push(ref(db, "analisis_pembuktian_teori_bilangan"), {
        nama: nama,
        nim: nim,
        jawaban: jawaban,
        waktu: new Date().toLocaleString()
    });

    alert("Link jawaban berhasil dikirim ke Firebase!");
}
</script>

</body>
</html>
