<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Tulis Online</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #nama {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 250px;
            margin-bottom: 10px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            margin: 10px auto;
            display: block;
            cursor: crosshair;
            touch-action: none; /* Penting untuk mobile */
        }

        .controls {
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-hapus { background: #ef4444; color: white; }
        .btn-kirim { background: #22c55e; color: white; }

        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .post-item {
            background: #334155;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .post-item p {
            margin: 0 0 10px 0;
            font-weight: bold;
            color: #38bdf8;
        }

        #gallery img {
            width: 250px;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>📝 Papan Tulis Online</h1>

    <input type="text" id="nama" placeholder="Masukkan Nama Anda..."><br>

    <canvas id="canvas" width="1000" height="400"></canvas><br>

    <div class="controls">
        <button class="btn-hapus" onclick="clearCanvas()">Hapus</button>
        <button class="btn-kirim" onclick="simpan()">Kirim Hasil</button>
    </div>

    <hr style="border: 0.5px solid #475569; width: 80%;">

    <h2>📚 Hasil Mahasiswa</h2>
    <div id="gallery"></div>

    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-database-compat.js"></script>

    <script>
        // 1. ===== CONFIG FIREBASE =====
        // Pastikan apiKey dan databaseURL benar dari console Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDGpG2vAoWqwn46upNtU9M-Cx1gkKwBE-c",
            authDomain: "chatting-matematika.firebaseapp.com", // Perbaikan tanda kutip
            databaseURL: "https://chatting-matematika-default-rtdb.firebaseio.com",
            projectId: "chatting-matematika",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ===== LOGIKA CANVAS =====
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "black";

        let drawing = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Menghitung posisi mouse maupun sentuhan jari
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            drawing = false;
        }

        // Event Mouse
        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("mouseup", stopDrawing);
        canvas.addEventListener("mouseleave", stopDrawing);

        // Event Touch (HP/Tablet)
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e); }, {passive: false});
        canvas.addEventListener("touchend", stopDrawing);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 3. ===== SIMPAN DATA =====
        function simpan() {
            const nama = document.getElementById("nama").value;
            const gambarData = canvas.toDataURL(); // Mengubah kanvas ke base64

            if (nama === "") {
                alert("Masukkan nama dulu!");
                return;
            }

            db.ref("gambar").push({
                nama: nama,
                gambar: gambarData,
                waktu: Date.now()
            }).then(() => {
                alert("Berhasil dikirim!");
                clearCanvas();
            }).catch((err) => {
                console.error(err);
                alert("Gagal kirim. Cek Rules Firebase Anda.");
            });
        }

        // 4. ===== TAMPILKAN DATA (REALTIME) =====
        const gallery = document.getElementById("gallery");

        db.ref("gambar").on("child_added", function(snapshot) {
            const data = snapshot.val();

            const div = document.createElement("div");
            div.className = "post-item";
            div.innerHTML = `
                <p>👤 ${data.nama}</p>
                <img src="${data.gambar}">
            `;

            // Menampilkan yang terbaru di atas
            gallery.prepend(div);
        });
    </script>

</body>
</html>
